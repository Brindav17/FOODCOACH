{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Forgot Password</h2>
    <form>
      <input type="email" placeholder="Enter your registered email" required>
      <button type="submit">Reset Password</button>
    </form>
    <p><a href="{{ url_for('login') }}">Back to login</a></p>
  </div>
</div>
{% endblock %}

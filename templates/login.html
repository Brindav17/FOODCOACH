{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
  <div class="auth-decor" aria-hidden="true"></div>

  <div class="auth-container">
    <div class="auth-logo">FC</div>
    <h2>Welcome back</h2>
    <div class="subtitle">Log in to your Food Coach account</div>

    <form method="POST" class="auth-form" action="{{ url_for('login') }}">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <div class="controls">
        <label><input type="checkbox" name="remember"> Remember me</label>
        <a href="{{ url_for('forgot_password') }}">Forgot?</a>
      </div>

      <button class="btn-primary" type="submit">Login</button>
    </form>

    <div class="social-row" style="margin-top:14px">
      <button class="social-btn" onclick="alert('Social login demo')">
        <span class="social-icon">G</span> Continue with Google
      </button>
    </div>

    <div class="auth-footer">
      Don’t have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
